name: OCI Free Tier Instance Creation

on:
  workflow_dispatch:        # manual trigger
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours

concurrency:
  group: oci-instance-creation
  cancel-in-progress: false

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 340     # stay under GitHub's 360-min hard cap (5h 40m)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Write OCI credentials from secrets
        run: |
          cat > oci_api_private_key.pem <<'EOF'
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 oci_api_private_key.pem

          cat > oci_config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=oci_api_private_key.pem
          EOF

          cat > id_rsa.pub <<'EOF'
          ${{ secrets.SSH_PUBLIC_KEY }}
          EOF

      - name: Write oci.env
        run: |
          cat > oci.env <<EOF
          # OCI Configuration
          OCI_CONFIG=oci_config
          OCT_FREE_AD=AD-1
          DISPLAY_NAME=agokola
          OCI_COMPUTE_SHAPE=VM.Standard.E2.1.Micro
          SECOND_MICRO_INSTANCE=True
          REQUEST_WAIT_TIME_SECS=90
          SSH_AUTHORIZED_KEYS_FILE=id_rsa.pub
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=22.04
          ASSIGN_PUBLIC_IP=false
          BOOT_VOLUME_SIZE=50
          NOTIFY_EMAIL=False
          EMAIL=
          EMAIL_PASSWORD=
          DISCORD_WEBHOOK=
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_USER_ID=${{ secrets.TELEGRAM_USER_ID }}
          EOF

      - name: Run instance creation script (tail only launch_instance.log)
        run: |
          set -o pipefail

          # Start main.py in the background
          python -u main.py &
          MAIN_PID=$!

          # Wait for launch_instance.log to appear (up to 30 seconds)
          for i in $(seq 1 30); do
            [ -f launch_instance.log ] && break
            sleep 1
          done
          touch launch_instance.log  # ensure it exists

          # Tail only launch_instance.log
          tail -n +1 -f launch_instance.log &
          TAIL_PID=$!

          # Wait for main.py to finish
          wait $MAIN_PID
          MAIN_EXIT=$?
          kill -9 $TAIL_PID 2>/dev/null || true
          exit $MAIN_EXIT

      - name: Upload artifacts (logs, results)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-run-artifacts
          path: |
            INSTANCE_CREATED
            *.log
            images_list.json
          if-no-files-found: ignore
