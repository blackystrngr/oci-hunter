name: OCI Free Tier Instance Creation

on:
  workflow_dispatch:        # lets you trigger it manually too
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours = 4 attempts/day, all day

concurrency:
  group: oci-instance-creation
  cancel-in-progress: false  # let a queued run wait instead of killing an in-flight one

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 340     # stay under GitHub's 360-min (6h) hard cap

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Write OCI credentials from secrets
        run: |
          cat > oci_api_private_key.pem <<'EOF'
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 oci_api_private_key.pem

          cat > oci_config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=oci_api_private_key.pem
          EOF

          cat > id_rsa.pub <<'EOF'
          ${{ secrets.SSH_PUBLIC_KEY }}
          EOF

      - name: Write oci.env
        run: |
          cat > oci.env <<EOF
          OCI_CONFIG=oci_config
          OCT_FREE_AD=AD-1
          DISPLAY_NAME=harythy
          OCI_COMPUTE_SHAPE=VM.Standard.E2.1.Micro
          SECOND_MICRO_INSTANCE=True
          REQUEST_WAIT_TIME_SECS=90
          SSH_AUTHORIZED_KEYS_FILE=id_rsa.pub
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=22.04
          ASSIGN_PUBLIC_IP=false
          BOOT_VOLUME_SIZE=50
          NOTIFY_EMAIL=False
          EMAIL=
          EMAIL_PASSWORD=
          DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_USER_ID=${{ secrets.TELEGRAM_USER_ID }}
          EOF

      - name: Notify Telegram (run started)
        if: ${{ secrets.TELEGRAM_TOKEN != '' && secrets.TELEGRAM_USER_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            -d text="🚀 OCI instance creation run started (run #${{ github.run_number }})"

      - name: Run instance creation script (with live log tailing)
        run: |
          set -o pipefail

          # Launch main.py in the background so we can tail its log files live
          python -u main.py &
          MAIN_PID=$!

          # Wait briefly for the log files to appear before tailing them
          for i in $(seq 1 30); do
            [ -f launch_instance.log ] && [ -f setup_and_info.log ] && break
            sleep 1
          done
          touch launch_instance.log setup_and_info.log

          # Stream both log files to the live Actions console
          tail -n +1 -f launch_instance.log setup_and_info.log &
          TAIL_PID=$!

          # Wait for main.py to finish, then stop tailing and propagate its exit code
          wait $MAIN_PID
          MAIN_EXIT=$?
          kill $TAIL_PID 2>/dev/null || true
          exit $MAIN_EXIT

      - name: Notify Telegram (run finished)
        if: ${{ always() && secrets.TELEGRAM_TOKEN != '' && secrets.TELEGRAM_USER_ID != '' }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MSG="✅ OCI instance creation run finished successfully (run #${{ github.run_number }})"
          else
            MSG="❌ OCI instance creation run failed or was cancelled (run #${{ github.run_number }})"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_USER_ID }}" \
            -d text="$MSG"

      - name: Upload results (if instance was created)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-run-artifacts
          path: |
            INSTANCE_CREATED
            *.log
            images_list.json
          if-no-files-found: ignore
